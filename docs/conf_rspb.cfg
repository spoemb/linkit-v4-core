# =============================================================================
# RSPB Bird Tracker - Deployment Configuration (Mortality Detection)
# =============================================================================
# Board: RSPB (nRF52840 + TPL5111 + M10Q + KIM2/SMD)
# Scenario: Oiseau terrestre, detection de mortalite
#           TPL5111 wake every 1h45, modulo=5 (~8h45 cycle, ~2.7 positions/jour)
# Battery: NCR18650 3400mAh
# Date: 2026-02-17
# Ref: docs/rspb_behavior.md
#
# Objectifs:
#   - 2 a 3 positions GPS par jour
#   - Capteurs AXL + Pression + Thermistor pour detection mortalite
#   - Mode low battery a 30% SOC (Doppler uniquement)
#   - Mode critique a 10% SOC (~3.3V) = arret total
#   - 5 messages satellite par session, espaces de 2 min
#   - 2 messages Doppler en low battery, espaces de 3 min
#   - 1 seul fix GNSS par session
#
# Usage: Envoyer ces commandes PARMW via BLE (ConfigurationState) ou USB DTE
#        avant deploiement sur chaque device.
#        Chaque ligne $PARMW... est une commande DTE independante.
#
# Format: $PARMW#<hex_length>;<key>=<value>[,<key>=<value>...]\r
# =============================================================================

# --- GNSS Timeouts (reduire gaspillage GPS) ---
# GNSS_COLD_ACQ_TIMEOUT: 530 -> 180s (cold start max 3 min)
# GNSS_ACQ_TIMEOUT: 120 -> 90s (warm/hot start plus rapide)
$PARMW#012;GNP09=180,GNP05=90\r

# --- SHUTDOWN_TIMER (securite anti-blocage) ---
# 900s = 15 min max. Ajuste pour 5 TX x 120s + GNSS cold start (180s) = ~780s max
$PARMW#009;PWP01=900\r

# --- BOOT_COUNTER_MODULO ---
# modulo=5 : cycle actif toutes les 5 wakeups = ~8h45 (5 x 1h45)
# Donne environ 2.7 positions par jour (entre 2 et 3)
$PARMW#007;PWP03=5\r

# --- GNSS Optimisation vol oiseau ---
# GNSS_DYN_MODEL: PORTABLE(0) -> AIRBORNE_1G(6) - dynamique de vol
# GNSS_HACCFILT_THR: 5 -> 10m - accepter fix moins precis = TTFF plus court
# GNSS_MIN_NUM_FIXES: 1 (un seul fix suffit)
$PARMW#019;GNP11=6,GNP21=10,GNP22=1\r

# --- Argos TX ---
# TR_NOM: 60 -> 120s (2 min entre chaque message satellite)
# ARGOS_RX_EN: true -> false (desactiver ecoute satellite = -3.75 mAh/cycle)
# NTRY_PER_MESSAGE: 6 -> 3 (reduire repetitions TX)
# DRY_TIME_BEFORE_TX: 1 -> 0 (pas de SWS, TX immediat)
$PARMW#021;ARP05=120,ARP32=0,ARP19=3,UNP02=0\r

# --- Underwater detection (inutile pour oiseau terrestre) ---
$PARMW#007;UNP01=0\r

# --- LEDs off (invisibles sur oiseau, economie energie) ---
$PARMW#00F;LDP01=0,LDP02=0\r

# --- Session shutdown (5 TX puis powerdown, 1 seul fix GNSS) ---
# SHUTDOWN_NTIME_SAT: 5 messages par session normale
# GNSS_SESSION_SINGLE_FIX: stopper GNSS apres premier fix
$PARMW#00F;PWP05=5,GNP30=1\r

# --- Low battery mode ---
# LB_EN: activer mode batterie faible
# LB_THRESHOLD: 30% (passer en mode LB a 30% SOC)
# LB_GNSS_EN: desactiver GNSS en LB (Doppler uniquement)
# LB_SHUTDOWN_NTIME_SAT: 2 messages Doppler par session LB
# TR_LB: 180s (3 min entre chaque TX Doppler en mode LB)
$PARMW#02A;LBP01=1,LBP02=30,LBP06=0,LBP14=2,ARP06=180\r

# --- Seuil critique batterie ---
# LB_CRITICAL_THRESH: 2.8V -> 3.3V (~10% SOC sur NCR18650)
# En dessous = arret total immediat, attendre recharge solaire
$PARMW#009;LBP12=3.3\r

# --- Capteurs: Accelerometre (detection mortalite) ---
# AXL_SENSOR_ENABLE: ON - detecter mouvement/immobilite de l'oiseau
# AXL_SENSOR_ENABLE_TX_MODE: ONESHOT - 1 mesure transmise par session
# Un oiseau mort ne bouge plus -> acceleration nulle dans les messages
$PARMW#015;AXP01=1,AXP05=ONESHOT\r

# --- Capteurs: Pression (detection mortalite) ---
# PRESSURE_SENSOR_ENABLE: ON - altitude/pression barometrique
# PRESSURE_SENSOR_ENABLE_TX_MODE: ONESHOT - 1 mesure transmise par session
# Un oiseau mort reste au sol -> pression constante, pas de variation d'altitude
$PARMW#015;PRP01=1,PRP04=ONESHOT\r

# --- Capteurs: Thermistor (detection mortalite) ---
# THERMISTOR_SENSOR_ENABLE: ON - temperature corporelle
# THERMISTOR_SENSOR_ENABLE_TX_MODE: ONESHOT - 1 mesure transmise par session
# Un oiseau mort -> temperature descend vers temperature ambiante
$PARMW#015;THP01=1,THP06=ONESHOT\r

# --- Profile name ---
$PARMW#017;IDP11=RSPB_MORTALITY_V1\r

# =============================================================================
# Resume des parametres modifies:
# =============================================================================
#
# | Parametre               | Cle DTE | Defaut  | Deploiement | Raison                        |
# |-------------------------|---------|---------|-------------|-------------------------------|
# | GNSS_COLD_ACQ_TIMEOUT   | GNP09   | 530     | 180         | Economie GPS echec            |
# | GNSS_ACQ_TIMEOUT        | GNP05   | 120     | 90          | TTFF plus rapide              |
# | SHUTDOWN_TIMER          | PWP01   | 0       | 900         | Securite (5TX x 120s + GPS)   |
# | BOOT_COUNTER_MODULO     | PWP03   | 2       | 5           | ~2.7 positions/jour           |
# | GNSS_DYN_MODEL          | GNP11   | 0       | 6           | Airborne (oiseau en vol)      |
# | GNSS_HACCFILT_THR       | GNP21   | 5       | 10          | Fix plus rapide               |
# | GNSS_MIN_NUM_FIXES      | GNP22   | 1       | 1           | (confirme)                    |
# | TR_NOM                  | ARP05   | 60      | 120         | 2 min entre messages          |
# | ARGOS_RX_EN             | ARP32   | 1       | 0           | -3.75 mAh/cycle               |
# | NTRY_PER_MESSAGE        | ARP19   | 6       | 3           | Repetitions reduites          |
# | DRY_TIME_BEFORE_TX      | UNP02   | 1       | 0           | TX immediat                   |
# | UNDERWATER_EN           | UNP01   | 0       | 0           | (confirme)                    |
# | LED_MODE                | LDP01   | 1       | 0           | LEDs off                      |
# | EXT_LED_MODE            | LDP02   | 3       | 0           | LEDs off                      |
# | SHUTDOWN_NTIME_SAT      | PWP05   | 0       | 5           | 5 TX par session              |
# | GNSS_SESSION_SINGLE_FIX | GNP30   | 0       | 1           | 1 seul fix GNSS               |
# | LB_EN                   | LBP01   | 0       | 1           | Active mode LB                |
# | LB_THRESHOLD            | LBP02   | 10      | 30          | LB a 30% SOC                 |
# | LB_GNSS_EN              | LBP06   | 1       | 0           | Doppler-only en LB            |
# | LB_SHUTDOWN_NTIME_SAT   | LBP14   | 0       | 2           | 2 Doppler TX en LB            |
# | TR_LB                   | ARP06   | 240     | 180         | 3 min entre Doppler TX        |
# | LB_CRITICAL_THRESH      | LBP12   | 2.8V    | 3.3V        | Critique a ~10% SOC           |
# | AXL_SENSOR_ENABLE       | AXP01   | 0       | 1           | Detection mortalite           |
# | AXL_SENSOR_TX_MODE      | AXP05   | OFF     | ONESHOT     | 1 mesure AXL par TX           |
# | PRESSURE_SENSOR_ENABLE  | PRP01   | 0       | 1           | Detection mortalite           |
# | PRESSURE_SENSOR_TX_MODE | PRP04   | OFF     | ONESHOT     | 1 mesure pression par TX      |
# | THERMISTOR_ENABLE       | THP01   | 0       | 1           | Detection mortalite           |
# | THERMISTOR_TX_MODE      | THP06   | OFF     | ONESHOT     | 1 mesure temperature par TX   |
# | PROFILE_NAME            | IDP11   | FACTORY | RSPB_MORT.  | Identification                |
#
# =============================================================================
# Comportement par mode batterie:
# =============================================================================
#
# | Mode         | Seuil      | GNSS    | Sensors      | TX Type    | TX Count | Intervalle | Fin            |
# |--------------|------------|---------|--------------|------------|----------|------------|----------------|
# | Normal       | > 30% SOC  | 1 fix   | AXL+PR+TH   | GNSS+Sens  | 5 (PWP05)| 120s (2min)| PMU::powerdown |
# | Low battery  | < 30% SOC  | OFF     | OFF          | Doppler    | 2 (LBP14)| 180s (3min)| PMU::powerdown |
# | Critique     | < 3.3V     | -       | -            | Aucun      | 0        | -          | Immediate      |
#
# =============================================================================
# Detection de mortalite - Indicateurs:
# =============================================================================
#
# Un oiseau mort sera detecte par la combinaison de:
#   1. Accelerometre (AXL): acceleration nulle/constante = pas de mouvement
#   2. Pression: valeur constante = pas de changement d'altitude (reste au sol)
#   3. Thermistor: temperature descendant vers l'ambiante (perte de chaleur corporelle)
#   4. Position GPS: meme position fixe sur plusieurs sessions consecutives
#
# En mode low battery (< 30%), seul le Doppler est transmis (localisation approx.)
# En mode critique (< 3.3V / ~10%), arret total pour proteger la batterie
#
# =============================================================================
# Estimation energetique par session:
# =============================================================================
#
# Mode normal (typique):
#   GNSS acquisition:     ~45s x 25mA  = ~312 uAh
#   Sensor sampling:      ~0.5s x 10mA = ~1.4 uAh
#   Satellite TX (x5):    ~480s x 15mA = ~2000 uAh
#   Total par session:    ~2.3 mAh
#   Avec modulo=5 (~2.7 sessions/jour): ~6.2 mAh/jour
#
# Mode low battery (typique):
#   Doppler TX (x2):      ~180s x 15mA = ~750 uAh
#   Total par session LB: ~0.75 mAh
#
# Filet de securite: SHUTDOWN_TIMER (900s) force powerdown si NTIME_SAT pas atteint
# =============================================================================
