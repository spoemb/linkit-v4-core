# =============================================================================
# RSPB Bird Tracker - Deployment Configuration
# =============================================================================
# Board: RSPB (nRF52840 + TPL5111 + M10Q + KIM2/SMD)
# Scenario: Oiseau terrestre, TPL5111 wake every 1h45, modulo=4 (~7h cycle)
# Battery: NCR18650 3400mAh
# Date: 2026-02-17
# Ref: docs/optimization_battery.md
#
# Usage: Envoyer ces commandes PARMW via BLE (ConfigurationState) ou USB DTE
#        avant deploiement sur chaque device.
#        Chaque ligne $PARMW... est une commande DTE independante.
#
# Format: $PARMW#<hex_length>;<key>=<value>[,<key>=<value>...]\r
# =============================================================================

# --- P0-2 : GNSS Timeouts (reduire gaspillage GPS) ---
# GNSS_COLD_ACQ_TIMEOUT: 530 -> 180s (cold start max 3 min, suffisant sans backup battery)
# GNSS_ACQ_TIMEOUT: 120 -> 90s (warm/hot start plus rapide)
$PARMW#00E;GNP09=180,GNP05=90\r

# --- P0-3 : SHUTDOWN_TIMER (securite anti-blocage) ---
# 600s = 10 min max cycle time. Evite drain catastrophique si FSM bloque.
# Mecanisme deja implemente dans main.cpp:848-861
$PARMW#00A;PWP01=600\r

# --- BOOT_COUNTER_MODULO ---
# modulo=4 : cycle actif toutes les 4 wakeups = ~7h (4 x 1h45)
# 3 reveils intermediaires font juste increment counter + powerdown
$PARMW#009;PWP03=4\r

# --- GNSS Optimisation vol oiseau ---
# GNSS_DYN_MODEL: PORTABLE(0) -> AIRBORNE_1G(6) - dynamique de vol
# GNSS_HACCFILT_THR: 5 -> 10m - accepter fix moins precis = TTFF plus court
# GNSS_MIN_NUM_FIXES: 1 (confirmer - un seul fix suffit)
$PARMW#015;GNP11=6,GNP21=10,GNP22=1\r

# --- Argos TX ---
# ARGOS_RX_EN: true -> false - desactiver 15min d'ecoute satellite (-3.75 mAh/cycle)
# NTRY_PER_MESSAGE: 6 -> 3 - reduire repetitions TX (economie ~3 msg x 0.056 mAh)
# DRY_TIME_BEFORE_TX: 1 -> 0 - pas de SWS, toujours en surface
$PARMW#016;ARP32=0,ARP19=3,UNP02=0\r

# --- Underwater detection (inutile pour oiseau) ---
# UNDERWATER_EN: confirmer false
$PARMW#009;UNP01=0\r

# --- LEDs (invisibles sur oiseau) ---
# LED_MODE: HRS_24(1) -> OFF(0) - couper LED status RGB
# EXT_LED_MODE: ALWAYS(3) -> OFF(0) - couper LED externe si presente
$PARMW#00E;LDP01=0,LDP02=0\r

# --- Session shutdown (powerdown apres N TX messages) ---
# SHUTDOWN_NTIME_SAT: 3 TX messages par session normale puis powerdown
# GNSS_SESSION_SINGLE_FIX: pas de re-acquisition GNSS apres premier fix
$PARMW#013;PWP05=3,GNP30=1\r

# --- Low battery mode ---
# LB_EN: activer mode batterie faible
# LB_GNSS_EN: desactiver GNSS en LB (Doppler uniquement, batterie seulement)
# LB_SHUTDOWN_NTIME_SAT: 2 messages Doppler par session LB puis powerdown
# TR_LB: 90s entre chaque TX Doppler en mode LB
$PARMW#01C;LBP01=1,LBP06=0,LBP14=2,ARP06=90\r

# --- Profile name ---
$PARMW#015;IDP11=RSPB_DEPLOY_V1\r

# =============================================================================
# Resume des parametres modifies:
# =============================================================================
#
# | Parametre               | Cle DTE | Defaut | Deploiement | Economie estimee       |
# |-------------------------|---------|--------|-------------|------------------------|
# | GNSS_COLD_ACQ_TIMEOUT   | GNP09   | 530    | 180         | ~6.8 mAh/echec GPS    |
# | GNSS_ACQ_TIMEOUT        | GNP05   | 120    | 90          | ~0.6 mAh/echec GPS    |
# | SHUTDOWN_TIMER          | PWP01   | 0      | 600         | Previent drain 122mAh  |
# | BOOT_COUNTER_MODULO     | PWP03   | 2      | 4           | ~7.8 mAh/7h           |
# | GNSS_DYN_MODEL          | GNP11   | 0      | 6           | TTFF plus rapide       |
# | GNSS_HACCFILT_THR       | GNP21   | 5      | 10          | TTFF plus rapide       |
# | GNSS_MIN_NUM_FIXES      | GNP22   | 1      | 1           | (confirme)             |
# | ARGOS_RX_EN             | ARP32   | 1      | 0           | ~3.75 mAh/cycle        |
# | NTRY_PER_MESSAGE        | ARP19   | 6      | 3           | ~0.17 mAh/cycle        |
# | DRY_TIME_BEFORE_TX      | UNP02   | 1      | 0           | Pas de SWS, TX direct  |
# | UNDERWATER_EN           | UNP01   | 0      | 0           | (confirme)             |
# | LED_MODE                | LDP01   | 1      | 0           | ~0.02 mAh/boot         |
# | EXT_LED_MODE            | LDP02   | 3      | 0           | variable               |
# | SHUTDOWN_NTIME_SAT      | PWP05   | 0      | 3           | Session TX limitee     |
# | GNSS_SESSION_SINGLE_FIX | GNP30   | 0      | 1           | Pas de re-acq GNSS     |
# | LB_EN                   | LBP01   | 0      | 1           | Active mode LB         |
# | LB_GNSS_EN              | LBP06   | 1      | 0           | Doppler-only en LB     |
# | LB_SHUTDOWN_NTIME_SAT   | LBP14   | 0      | 2           | 2 Doppler TX en LB     |
# | TR_LB                   | ARP06   | 240    | 90          | Intervalle LB TX       |
# | PROFILE_NAME            | IDP11   | FACTORY| RSPB_DEPLOY | identification          |
#
# =============================================================================
# Comportement par mode batterie:
# =============================================================================
#
# | Mode         | GNSS        | Sensors | TX Type   | TX Count | Intervalle | Fin            |
# |--------------|-------------|---------|-----------|----------|------------|----------------|
# | Normal       | 1 fix       | Oui     | GNSS/Sens | 3 (PWP05)| 60s (TR)   | PMU::powerdown |
# | Low battery  | OFF (LBP06) | Run     | Doppler   | 2 (LBP14)| 90s (TR_LB)| PMU::powerdown |
# | Critique     | -           | -       | Aucun     | 0        | -          | Immediate      |
#
# Filet de securite: SHUTDOWN_TIMER (600s) force powerdown si NTIME_SAT pas atteint
# =============================================================================
