#   Dead bird: converges to ambient (10-25C)
THERMISTOR_SENSOR_ENABLE = 1
THERMISTOR_SENSOR_PERIODIC = 0
THERMISTOR_SENSOR_WAKEUP_THRESH = 0.0
THERMISTOR_SENSOR_WAKEUP_SAMPLES = 0
THERMISTOR_SENSOR_ENABLE_TX_MODE = ONESHOT
THERMISTOR_SENSOR_ENABLE_TX_MAX_SAMPLES = 1
THERMISTOR_SENSOR_ENABLE_TX_SAMPLE_PERIOD = 1000

# --- Pressure Sensor (LPS28DFW) ---
# Barometric pressure + temperature for altitude/flight detection
PRESSURE_SENSOR_ENABLE = 1
PRESSURE_SENSOR_PERIODIC = 0
PRESSURE_SENSOR_FULL_SCALE = 1260
PRESSURE_SENSOR_LOGGING_MODE = ALWAYS
PRESSURE_SENSOR_ENABLE_TX_MODE = ONESHOT
PRESSURE_SENSOR_ENABLE_TX_MAX_SAMPLES = 1
PRESSURE_SENSOR_ENABLE_TX_SAMPLE_PERIOD = 1000

# --- Mortality Detection Service ---
# Combines accelerometer activity, body temperature, and GPS stationarity
# to compute a mortality confidence percentage (0-100%).
#
# Algorithm:
#   activity_score (40pts): activity < ACTIVITY_THRESH => immobile
#   temp_score     (30pts): body_temp < TEMP_THRESH => hypothermic
#   gps_score      (30pts): distance < GPS_DISTANCE_THRESH AND speed < 0.1m/s => stationary
#   session_score = sum of above (0-100)
#   confidence = exponential moving average over sessions
#   After CONFIRM_DAYS consecutive days with confidence >= 80% => CONFIRMED
#
# DUTY_CYCLE_MODULO: When mortality confirmed, reduce wakeup frequency
#   0 = disabled (never modify duty cycle, just report confidence)
#   >0 = new BOOT_COUNTER_MODULO value when confirmed (e.g., 6 = wake every 6th TPL5111 cycle)
MORTALITY_ENABLE = 1
MORTALITY_ACTIVITY_THRESH = 10
MORTALITY_TEMP_THRESH = 25.0
MORTALITY_GPS_DISTANCE_THRESH = 50
MORTALITY_CONFIRM_DAYS = 3
MORTALITY_DUTY_CYCLE_MODULO = 6

