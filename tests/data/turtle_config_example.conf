# Example config file for TurtleSimulationShortSurface
# Format: KEY=value, one per line. Lines starting with # are comments.
# Empty lines are ignored.
# All DTE param keys are supported (same as PARMW).
#
# Pass to simulation via:
#   TURTLE_CONFIG_PATH=/path/to/this.conf ./TurtleSimulation -g TurtleSimShortSurface
#
# Or use a project-relative path:
#   TURTLE_CONFIG_PATH=tests/data/turtle_config_example.conf ./TurtleSimulation ...

# ─────────────────────────────────────────────────────────────────
# Argos TX configuration
# ─────────────────────────────────────────────────────────────────
ARP01=5               # ARGOS_MODE = SURFACING_BURST
ARP05=60              # TR_NOM 60s
ARP40=5               # SURFACING_BURST_INIT_S = 5s (= spacing-guard min)
ARP41=10              # SURFACING_BURST_STEP_S = 10s
ARP42=30              # SURFACING_BURST_MAX_S = 30s
ARP43=0               # SURFACING_BURST_MAX_MSG = 0 (unlimited)

# ─────────────────────────────────────────────────────────────────
# GNSS configuration
# ─────────────────────────────────────────────────────────────────
GNP01=1               # GNSS_EN = true
GNP05=60              # GNSS_ACQ_TIMEOUT 60s
GNP25=1               # GNSS_TRIGGER_ON_SURFACED = true
GNP50=86400           # GNSS_REUSE_FIX_MAX_AGE_S = 24h

# ─────────────────────────────────────────────────────────────────
# Underwater detection (SWS)
# ─────────────────────────────────────────────────────────────────
UNP01=1               # UNDERWATER_EN = true
UNP20=900             # MIN_SURFACE_CYCLE_INTERVAL_S = 15min cooldown
UNP30=3               # COOLDOWN_TRIGGER_MODE = AFTER_LAST_TX

# ─────────────────────────────────────────────────────────────────
# Rate limiter (Plan 1 step 2)
# ─────────────────────────────────────────────────────────────────
RLP01=1               # RATE_LIMIT_EN = true
RLP02=3600            # RATE_LIMIT_WINDOW_S = 1h
RLP03=10              # RATE_LIMIT_MAX_TX = 10

# ─────────────────────────────────────────────────────────────────
# Hauled-vs-At-sea (Plan 1 step 3)
# ─────────────────────────────────────────────────────────────────
HMP00=1               # HAULED_DETECT_EN = true
HMP01=24              # HAULED_IDLE_THRESHOLD_H = 24h
HMP02=3               # HAULED_RETURN_EVENTS = 3
HMP10=2               # HAULED_ARGOS_MODE = LEGACY (SURFACING_BURST forbidden)
HMP11=7200            # HAULED_TR_NOM = 2h
HMP12=0               # HAULED_GNSS_EN = false
HMP13=1               # HAULED_GNSS_STRAT = REUSE_LAST

# ─────────────────────────────────────────────────────────────────
# LED behavior
# ─────────────────────────────────────────────────────────────────
LDP01=3               # LED_MODE = ALWAYS (visible in bench tests; use 0 = OFF for deploy)

# ─────────────────────────────────────────────────────────────────
# Battery monitoring (LB mode triggers if voltage drops below threshold)
# ─────────────────────────────────────────────────────────────────
LBP01=1               # LB_EN = true
LBP02=15              # LB_THRESHOLD = 15% SoC

# ─────────────────────────────────────────────────────────────────
# Simulation-only meta (parsed by the runner, not pushed to ConfigStore)
# Prefix: SIM_
# ─────────────────────────────────────────────────────────────────
SIM_DURATION_DAYS=7              # Total simulation duration in days
SIM_DIVE_MIN_S=60                # Minimum dive duration (seconds)
SIM_DIVE_MAX_S=900               # Maximum dive duration (15 min)
SIM_DIVE_AVG_S=300               # Typical dive duration (5 min)
SIM_SURFACE_MIN_S=10             # Minimum surface duration (seconds)
SIM_SURFACE_MAX_S=90             # Maximum surface duration
SIM_SURFACE_AVG_S=30             # Typical short-surface duration (30s)
SIM_GPS_FIX_PROB=0.4             # Probability of getting a real GPS fix per surface (0.0..1.0)
SIM_FASTLOC_PROB=0.3             # Probability of FastLoc on a surface (when no full fix)
SIM_GPS_TTFF_AVG_S=15            # Avg GPS time-to-fix (s) on a successful surface
SIM_HAULED_DAY=999               # Day at which animal goes hauled (999 = never)
SIM_RANDOM_SEED=42               # Reproducible scenario
SIM_BATTERY_CAPACITY_MAH=2400    # Battery capacity for SoC estimation
SIM_OUTPUT_CSV=turtle_short_surface.csv    # CSV with per-hour metrics
SIM_OUTPUT_HTML=turtle_short_surface.html  # HTML report
