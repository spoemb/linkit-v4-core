[PARAM]
# ============================================================
# LinkIt V4 SMD - Turtle Underwater Surfacing Burst Profile
# ============================================================
# Mode: SURFACING_BURST (5)
# - Rapid Doppler messages on surfacing with progressive intervals
# - Automatic switch to GNSS TX once GPS fix acquired
# - SWS analog underwater detection
# - No sensors (pure position tracking)
# ============================================================

# --- Device identification ---
ARGOS_DECID = 0
ARGOS_HEXID = 0
ARGOS_SECKEY =
ARGOS_RADIOCONF =
DEVICE_MODEL = LinkIt V4
PROFILE_NAME = TURTLE_UW_BURST_V1

# --- Argos TX: Surfacing Burst mode ---
ARGOS_MODE = SURFACING_BURST
ARGOS_TX_REPETITION = 60
ARGOS_DUTY_CYCLE = 000000
ARGOS_NTRY_PER_MESSAGE = 0
ARGOS_NBLASTFIX_TOSEND = 16
ARGOS_TX_JITTER_EN = 1
ARGOS_TIME_SYNC_BURST_EN = 0
ARGOS_TCXO_WARMUP_TIME = 2
ARGOS_RX_EN = 1
ARGOS_RX_MAX_WINDOW = 900
ARGOS_RX_AOP_UPDATE_PERIOD = 90

# --- Surfacing Burst parameters ---
# Doppler: 1st immediate, 2nd at 5s, then +10s increment
# Sequence: 0s, 5s, 15s, 25s, 35s, 45s, 55s, 60s, 60s...
SURFACING_BURST_INIT_S = 5
SURFACING_BURST_STEP_S = 10
SURFACING_BURST_MAX_S = 60

# --- GNSS (priority: fastest fix, precision secondary) ---
GNSS_ENABLE = 1
GNSS_DELTATIME_ACQ = 10
GNSS_ACQ_TIMEOUT = 90
GNSS_COLD_ACQ_TIMEOUT = 180
GNSS_COLD_START_RETRY_PERIOD = 60
GNSS_FIX_MODE = AUTO
GNSS_DYN_MODEL = SEA
GNSS_HDOPFILT_ENABLE = 0
GNSS_HDOPFILT_THR = 2
GNSS_HACCFILT_ENABLE = 0
GNSS_HACCFILT_THR = 50
GNSS_MIN_NUM_FIXES = 1
GNSS_NBLASTFIX_TOSEND = 16
GNSS_ASSISTNOW_EN = 1
GNSS_ASSISTNOW_OFFLINE_EN = 0
GNSS_TRIGGER_ON_SURFACED = 1
GNSS_TRIGGER_ON_AXL_WAKEUP = 0
GNSS_TRIGGER_COLD_START_ON_SURFACED = 0
GNSS_SESSION_SINGLE_FIX = 0

# --- Underwater detection (SWS analog) ---
UW_ENABLE = 1
UW_DRY_TIME_BEFORE_TX = 0
UW_DRY_SAMPLING = 10
UW_WET_SAMPLING = 2
UW_MAX_SAMPLES = 1
UW_MIN_DRY_SAMPLES = 1
UW_SAMPLE_GAP = 1000
UW_PIN_SAMPLE_DELAY = 1
UW_MAX_DIVE_TIME = 7200
UW_MIN_SURFACE_TIME = 5

# --- SWS Analog calibration ---
SWS_ANALOG_HYSTERESIS = 6
SWS_ANALOG_CALIB_INTERVAL = 3600

# --- Dive mode (disabled) ---
UW_DIVE_MODE_ENABLE = 0
UW_DIVE_MODE_START_TIME = 0

# --- All sensors disabled ---
AXL_SENSOR_ENABLE = 0
AXL_SENSOR_PERIODIC = 0
PRESSURE_SENSOR_ENABLE = 0
PRESSURE_SENSOR_PERIODIC = 0
SEA_TEMP_SENSOR_ENABLE = 0
SEA_TEMP_SENSOR_PERIODIC = 0
THERMISTOR_SENSOR_ENABLE = 0
THERMISTOR_SENSOR_PERIODIC = 0

# --- LED ---
LED_MODE = HRS_24
EXT_LED_MODE = ALWAYS
DEBUG_OUTPUT_MODE = USB_CDC

# --- Low battery (no critical threshold — drain battery to maximum) ---
LB_EN = 1
LB_TRESHOLD = 15
LB_CRITICAL_THRESH = 0
LB_ARGOS_MODE = SURFACING_BURST
LB_GNSS_EN = 0
LB_ARGOS_DUTY_CYCLE = 000000
LB_ARGOS_TX_REPETITION = 120
LB_GNSS_ACQ_TIMEOUT = 120
LB_GNSS_DELTATIME_ACQ = 60
LB_GNSS_HACCFILT_THR = 5
LB_GNSS_HDOPFILT_THR = 2
LB_GNSS_NBLASTFIX_TOSEND = 1
LB_NTRY_PER_MESSAGE = 0
LB_SHUTDOWN_NTIME_SAT = 0

# --- Session shutdown (0 = unlimited) ---
SHUTDOWN_NTIME_SAT = 0

# --- Pass prediction ---
PP_MIN_ELEVATION = 15.0
PP_MAX_ELEVATION = 90.0
PP_MIN_DURATION = 30
PP_MAX_PASSES = 1000
PP_LINEAR_MARGIN = 300
PP_COMP_STEP = 10

# --- Zone (disabled) ---
ZONE_TYPE = CIRCLE
ZONE_ENABLE_OUT_OF_ZONE_DETECTION_MODE = 0
ZONE_ENABLE_ACTIVATION_DATE = 1
ZONE_ACTIVATION_DATE = 01/01/2020 00:00:00
ZONE_ARGOS_DEPTH_PILE = 1
ZONE_ARGOS_DUTY_CYCLE = FFFFFF
ZONE_ARGOS_MODE = LEGACY
ZONE_ARGOS_NTRY_PER_MESSAGE = 0
ZONE_ARGOS_REPETITION_SECONDS = 240
ZONE_CENTER_LATITUDE = 0.0
ZONE_CENTER_LONGITUDE = 0.0
ZONE_GNSS_ACQ_TIMEOUT = 240
ZONE_GNSS_DELTATIME_ACQ = 60
ZONE_GNSS_HACCFILT_THR = 5
ZONE_GNSS_HDOPFILT_THR = 2
ZONE_RADIUS = 1000

# --- Certification (disabled) ---
CERT_TX_ENABLE = 0
CERT_TX_MODULATION = LDA2
CERT_TX_PAYLOAD = FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF
CERT_TX_REPETITION = 60
