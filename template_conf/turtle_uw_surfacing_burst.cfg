[PARAM]
# ============================================================
# Sea Turtle Tracker Satellite — Deployment Configuration v2
# ============================================================
# Optimized 30/03/2026 based on:
#   - Leonor Rocha turtle behavioral data (7 turtles, Feb 2026)
#   - Energy budget analysis v1 (Saft LSP 26500, 27720 mWh)
#   - ADR-001: 45 min cooldown → ~32 cycles/day → 14+ months
#   - ADR-002: 3 TX per cycle (2× Doppler VLDA4 + 1× GNSS LDK)
#   - ADR-003: Graceful abort on dive (keep Doppler, stop GPS)
#
# Mode: SURFACING_BURST
#   Phase 1: Immediate Doppler VLDA4 (position Kineis, no GPS needed)
#   Phase 2: GPS fix → GNSS LDK packet (precise position)
#   Abort: If turtle dives mid-cycle, Doppler data is NOT lost
#
# Target: >1 year battery, ~6000+ GPS positions/year
# ============================================================

# --- Device identification (SET BEFORE DEPLOYMENT) ---
ARGOS_DECID = 0
ARGOS_HEXID = 0
ARGOS_SECKEY =
ARGOS_RADIOCONF =
DEVICE_MODEL = LinkIt V4
PROFILE_NAME = SEA_TURTLE_SAT_V2

# --- Argos TX: Surfacing Burst mode ---
ARGOS_MODE = SURFACING_BURST
ARGOS_TX_REPETITION = 60
ARGOS_DUTY_CYCLE = 000000
ARGOS_NTRY_PER_MESSAGE = 0
ARGOS_NBLASTFIX_TOSEND = 4
ARGOS_TX_JITTER_EN = 1
ARGOS_TIME_SYNC_BURST_EN = 0
ARGOS_TCXO_WARMUP_TIME = 2

# Argos RX: receive Kineis AOP updates when available
ARGOS_RX_EN = 1
ARGOS_RX_MAX_WINDOW = 900
ARGOS_RX_AOP_UPDATE_PERIOD = 90

# Adaptive modulation: auto-select VLDA4 for Doppler, LDK for GNSS
ARGOS_ADAPTIVE_MODULATION = 1

# Per-modulation radio configurations (Kineis defaults)
ARGOS_RADIOCONF_LDK = 03921fb104b92859209b18abd009de96
ARGOS_RADIOCONF_LDA2 = 3d678af16b5a572078f3dbc95a1104e7
ARGOS_RADIOCONF_VLDA4 = 82d07f9d9ce081ee4492983672d75493

# --- Surfacing Burst timing ---
# t=0s: 1st Doppler VLDA4 (immediate, Kineis Doppler positioning)
# t=3s: 2nd Doppler VLDA4 (improves Doppler accuracy)
# Then GPS fix → switch to GNSS LDK at TR_NOM interval
# Max session: 30s (most surfacings are 6-19s, abort gracefully)
SURFACING_BURST_INIT_S = 3
SURFACING_BURST_STEP_S = 3
SURFACING_BURST_MAX_S = 30
SURFACING_BURST_MAX_MSG = 5
SURFACING_GNSS_MAX_TX = 0

# --- SMD low-power mode ---
# 0x01=NONE (host cuts power), 0x04=STOP (low idle current)
SMD_LPM_MODE = 1

# --- Cooldown: minimum interval between active cycles ---
# 45 min → max ~32 cycles/day → 14+ months battery life
# Persists across System OFF via noinit RAM
# Passive surfacings (during cooldown) are counted but no GPS/TX
MIN_SURFACE_CYCLE_INTERVAL_S = 2700

# --- GNSS: fastest fix, trigger on surface ---
GNSS_ENABLE = 1
GNSS_DELTATIME_ACQ = 10
GNSS_ACQ_TIMEOUT = 30
GNSS_COLD_ACQ_TIMEOUT = 60
GNSS_COLD_START_RETRY_PERIOD = 60
GNSS_FIX_MODE = AUTO
GNSS_DYN_MODEL = SEA
GNSS_MIN_NUM_FIXES = 1
GNSS_NBLASTFIX_TOSEND = 4
GNSS_TRIGGER_ON_SURFACED = 1
GNSS_TRIGGER_ON_AXL_WAKEUP = 0
GNSS_TRIGGER_COLD_START_ON_SURFACED = 0
GNSS_SESSION_SINGLE_FIX = 1

# GNSS filtering: accept 2D fixes (turtles are at sea level)
GNSS_HDOPFILT_ENABLE = 0
GNSS_HDOPFILT_THR = 2
GNSS_HACCFILT_ENABLE = 1
GNSS_HACCFILT_THR = 100

# AssistNow: offline ephemerides (load gps_config.dat before deployment!)
GNSS_ASSISTNOW_EN = 1
GNSS_ASSISTNOW_OFFLINE_EN = 1

# Constellations: GPS + Galileo + GLONASS (BeiDou off = faster TTFF)
GNSS_CONSTELLATION_MASK = 7

# AssistNow Autonomous: max orbit error tolerance
GNSS_ORBMAXERR = 300

# Signal quality: moderate thresholds for marine environment
GNSS_MIN_CNO = 6
GNSS_MIN_ELEV = 5

# --- Underwater detection (SWS analog) ---
UW_ENABLE = 1
UW_DRY_TIME_BEFORE_TX = 0
UW_DRY_SAMPLING = 10
UW_WET_SAMPLING = 2
UW_MAX_SAMPLES = 1
UW_MIN_DRY_SAMPLES = 1
UW_SAMPLE_GAP = 1000
UW_PIN_SAMPLE_DELAY = 1
UW_MAX_DIVE_TIME = 7200
UW_MIN_SURFACE_TIME = 2

# --- SWS Analog calibration ---
# Hysteresis 4% (reduced from 6% for faster detection)
# Recalibrate every hour
SWS_ANALOG_HYSTERESIS = 4
SWS_ANALOG_CALIB_INTERVAL = 3600

# --- Dive mode (disabled — SWS handles everything) ---
UW_DIVE_MODE_ENABLE = 0
UW_DIVE_MODE_START_TIME = 0

# --- All environmental sensors disabled (pure position tracker) ---
AXL_SENSOR_ENABLE = 0
AXL_SENSOR_PERIODIC = 0
PRESSURE_SENSOR_ENABLE = 0
PRESSURE_SENSOR_PERIODIC = 0
SEA_TEMP_SENSOR_ENABLE = 0
SEA_TEMP_SENSOR_PERIODIC = 0
THERMISTOR_SENSOR_ENABLE = 0
THERMISTOR_SENSOR_PERIODIC = 0

# --- LED: minimal power (off after 24h) ---
LED_MODE = HRS_24
EXT_LED_MODE = ALWAYS
DEBUG_OUTPUT_MODE = USB_CDC

# --- Low battery mode ---
# At 15% battery: GPS off, Doppler only, double interval
# This extends final months by ~50% with coarse Doppler positions
LB_EN = 1
LB_TRESHOLD = 15
LB_CRITICAL_THRESH = 5
LB_ARGOS_MODE = SURFACING_BURST
LB_GNSS_EN = 0
LB_ARGOS_DUTY_CYCLE = 000000
LB_ARGOS_TX_REPETITION = 120
LB_GNSS_ACQ_TIMEOUT = 60
LB_GNSS_DELTATIME_ACQ = 30
LB_GNSS_HACCFILT_THR = 100
LB_GNSS_HDOPFILT_THR = 2
LB_GNSS_NBLASTFIX_TOSEND = 1
LB_NTRY_PER_MESSAGE = 0
LB_SHUTDOWN_NTIME_SAT = 0

# --- Session shutdown (0 = unlimited) ---
SHUTDOWN_NTIME_SAT = 0

# --- Pass prediction (satellite visibility) ---
PP_MIN_ELEVATION = 15.0
PP_MAX_ELEVATION = 90.0
PP_MIN_DURATION = 30
PP_MAX_PASSES = 1000
PP_LINEAR_MARGIN = 300
PP_COMP_STEP = 10

# --- Zone (disabled) ---
ZONE_TYPE = CIRCLE
ZONE_ENABLE_OUT_OF_ZONE_DETECTION_MODE = 0
ZONE_ENABLE_ACTIVATION_DATE = 1
ZONE_ACTIVATION_DATE = 01/01/2020 00:00:00
ZONE_ARGOS_DEPTH_PILE = 1
ZONE_ARGOS_DUTY_CYCLE = FFFFFF
ZONE_ARGOS_MODE = LEGACY
ZONE_ARGOS_NTRY_PER_MESSAGE = 0
ZONE_ARGOS_REPETITION_SECONDS = 240
ZONE_CENTER_LATITUDE = 0.0
ZONE_CENTER_LONGITUDE = 0.0
ZONE_GNSS_ACQ_TIMEOUT = 240
ZONE_GNSS_DELTATIME_ACQ = 60
ZONE_GNSS_HACCFILT_THR = 5
ZONE_GNSS_HDOPFILT_THR = 2
ZONE_RADIUS = 1000

# --- Certification (disabled in deployment) ---
CERT_TX_ENABLE = 0
CERT_TX_MODULATION = LDA2
CERT_TX_PAYLOAD = FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF
CERT_TX_REPETITION = 60
